<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gomoku (Web)</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="wrap">
    <header class="page-head">
      <h1 class="title">Gomoku</h1>
      <ul class="rules" aria-label="How to play">
        <li>First to get five in a row (horizontal, vertical, or diagonal) wins.</li>
      </ul>
    </header>

    <section class="controls">
      <label class="field">
        <span class="field__label">Mode</span>
        <select id="modeSelect" class="select">
          <option value="human_vs_ai">Human vs AI</option>
          <option value="ai_vs_ai">AI vs AI (watch)</option>
        </select>
      </label>

      <!-- human-vs-ai controls -->
      <label class="field" id="sideField">
        <span class="field__label">You play</span>
        <select id="sideSelect" class="select">
          <option value="black">Black (first)</option>
          <option value="white">White (AI first)</option>
        </select>
      </label>
      <label class="field" id="agentField">
        <span class="field__label">Opponent</span>
        <select id="agentSelect" class="select"></select>
      </label>

      <!-- ai-vs-ai controls (hidden by default) -->
      <label class="field" id="blackAgentField" style="display:none">
        <span class="field__label">Black agent</span>
        <select id="blackAgentSelect" class="select"></select>
      </label>
      <label class="field" id="whiteAgentField" style="display:none">
        <span class="field__label">White agent</span>
        <select id="whiteAgentSelect" class="select"></select>
      </label>

      <button type="button" id="newBtn" class="btn btn--secondary">New game</button>
      <button type="button" id="stopBtn" class="btn btn--secondary" style="display:none">Stop</button>
    </section>

    <p id="status" class="status" aria-live="polite">Choose a side, then start on the board.</p>

    <div class="board-shell">
      <div class="board-frame" id="boardFrame">
        <div class="coord-spacer" aria-hidden="true"></div>
        <div class="coord-cols" id="coordCols" aria-hidden="true"></div>
        <div class="coord-rows" id="coordRows" aria-hidden="true"></div>
        <div
          id="board"
          class="board"
          role="application"
          aria-label="Gomoku board, 15 by 15 intersections"
        >
          <div class="board-lines" aria-hidden="true"></div>
          <div class="board-stars" aria-hidden="true">
            <span class="star-point" style="--sr: 3; --sc: 3"></span>
            <span class="star-point" style="--sr: 3; --sc: 11"></span>
            <span class="star-point" style="--sr: 7; --sc: 7"></span>
            <span class="star-point" style="--sr: 11; --sc: 3"></span>
            <span class="star-point" style="--sr: 11; --sc: 11"></span>
          </div>
          <div id="intersections" class="board-intersections"></div>
          <div class="board-shade" aria-hidden="true"></div>
          <div class="board-overlay board-overlay--start" id="startOverlay">
            <div class="start-card">
              <p class="start-card__hint">Ready when you are</p>
              <button type="button" id="startBoardBtn" class="btn btn--primary">
                Start game
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
